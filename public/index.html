<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React App</title>
  <style>
    body {
      background: gray;
    }

    .book-card {
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 16px;
      margin: 16px;
      max-width: 300px;
      background-color: #f9f9f9;
    }

    .book-card h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .book-card p {
      margin: 4px 0;
      color: #555;
    }

    .book-catalog {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      justify-content: space-around;
    }

    .add-book-form {
      margin: 20px 0;
      padding: 26px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #f2f2f2;
      max-width: 600px;
    }

    .add-book-form h3 {
      margin-bottom: 16px;
      font-size: 1.5rem;
    }

    .add-book-form label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .add-book-form input {
      width: 100%;
      padding: 8px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    .add-book-form button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    .add-book-form button:hover {
      background-color: #45a049;
    }

  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

  let books = [
    {
      title: "book1",
      author: "author1",
      category: "category1",
      description: "desc1"
    },
    {
      title: "book2",
      author: "author2",
      category: "category2",
      description: "desc2"
    },
    {
      title: "book3",
      author: "author2",
      category: "category2",
      description: "desc1"
    }
  ];

  const App = ({ books, categories }) => {
    return (
            <>
              <AddBook/>
              <select name="categories" id="category-select" onChange={selectHandler}>
                <option value="">--Please choose a category--</option>
                {categories.map((category, index) => (
                        <option key={index} value={category}>{category}</option>
                ))}
              </select>
              <BookCatalog books={books}></BookCatalog>
            </>
    );
  }

  const BookCatalog = ({ books }) => {
    return (
            <div className="book-catalog">
              {books.map((book, index) => (
                      <div key={index}><Book book={book}/></div>
              ))}
            </div>
    );
  };

  const Book = ({book}) => {
    return (
            <div className="book-card">
              <h2>{book.title}</h2>
              <p><strong>Author:</strong> {book.author}</p>
              <p><strong>Category:</strong> {book.category}</p>
              <p><strong>Description:</strong> {book.description}</p>
            </div>
    );
  };

  const AddBook = () => {
    let newBook = {title: '', author: '', category: '', description: ''};

    const handleSubmit = (e) => {
      e.preventDefault();
      books.push(newBook);
      renderApp();
      e.target.reset();
    };

    const handleInputChange = (e) => {
      newBook[e.target.name] = e.target.value;
    };

    return (
            <form className="add-book-form" onSubmit={handleSubmit}>
              <h3>Add a New Book</h3>
              <div>
                <label>Title: </label>
                <input type="text" name="title" onChange={handleInputChange} required />
              </div>
              <div>
                <label>Author: </label>
                <input type="text" name="author" onChange={handleInputChange} required />
              </div>
              <div>
                <label>Category: </label>
                <input type="text" name="category" onChange={handleInputChange} required />
              </div>
              <div>
                <label>Description: </label>
                <input type="text" name="description" onChange={handleInputChange} required />
              </div>
              <button type="submit">Add Book</button>
            </form>
    );
  };


  function selectHandler() {
    renderApp(document.getElementById("category-select").value)
  }

  function renderApp(selectedCategory) {
    let filteredBooks = []
    if (selectedCategory) {
      console.log("Selected category:", selectedCategory);
      filteredBooks = books.filter((book) => book.category === selectedCategory)
    } else {
      filteredBooks = books;
    }

    const categories = [...new Set(books.map(book => book.category))];

    root.render(<App books={filteredBooks} categories={categories} />);
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  renderApp()

</script>

</body>
</html>
